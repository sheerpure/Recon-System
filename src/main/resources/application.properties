# ===============================================================
# H2 Database Console Configuration
# Access the UI via: http://localhost:8081/h2-console
# ===============================================================
# Enable the H2 web interface for local development debugging
server.port=8081
spring.h2.console.enabled=true

# Database connection settings (Using In-Memory DB for rapid MVP development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================================================
# JPA / Hibernate Configuration
# ===============================================================
# Automatically update the database schema based on Entity classes
# Note: Use 'update' for dev, 'validate' or 'none' for production environments
spring.jpa.hibernate.ddl-auto=update

# Show executed SQL queries in the console for debugging purposes
spring.jpa.show-sql=true

# Format the SQL output for better readability
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=DEBUG
server.error.include-message=always

# 允許單個檔案最大 500MB 
spring.servlet.multipart.max-file-size=500MB

# 允許單次請求總計最大 500MB
spring.servlet.multipart.max-request-size=500MB

spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true

spring.h2.console.settings.web-allow-others=true
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Recon-System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-200 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-indigo-600 w-12 h-12 rounded-xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-indigo-200">
                <span class="text-white font-bold text-xl">R</span>
            </div>
            <h1 class="text-2xl font-black text-slate-900">Welcome Back</h1>
            <p class="text-slate-500 text-sm mt-2">Fintech Reconciliation System</p>
        </div>

        <div id="loginError" class="hidden mb-6 p-3 bg-red-50 text-red-600 text-xs font-bold rounded-lg border border-red-100 text-center">
            Invalid username or password
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required 
                       class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required 
                       class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all">
            </div>
            <button type="submit" id="submitBtn"
                    class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 mt-2">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">
                Default Access: admin / admin123
            </p>
        </div>
    </div>

    <script th:inline="javascript">
        /**
         * Wait for DOM content to be fully loaded before attaching events.
         * This prevents 'null' reference errors on the loginForm element.
         */
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const errorDiv = document.getElementById('loginError');

            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    // 1. Prevent the browser from performing a traditional page refresh/POST
                    e.preventDefault();
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;

                    console.log(`[Auth] Attempting login for user: ${username}`);

                    try {
                        // 2. Perform Async AJAX request to the JWT Auth Controller
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            console.log("[Auth] Token received successfully.");

                            // 3. Persist the JWT token to browser's LocalStorage for future API calls
                            localStorage.setItem('jwt_token', data.token);
                            localStorage.setItem('username', username);

                            // 4. Redirect the user to the protected Dashboard
                            window.location.href = '/';
                        } else {
                            console.warn("[Auth] Login failed. Invalid credentials.");
                            errorDiv.classList.remove('hidden');
                        }
                    } catch (err) {
                        console.error('[Auth] Network error or server unreachable:', err);
                        alert("System Error: Unable to connect to Authentication Service.");
                    }
                });
            } else {
                console.error("[Auth] Fatal: loginForm element not found in DOM.");
            }
        });
    </script>
</body>
</html>
